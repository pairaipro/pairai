name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install channel dependencies
        run: cd channel && npm install

      - name: Test channel
        run: cd channel && npx vitest run --passWithNoTests

      - name: Install bridge dependencies
        run: cd bridge && npm install

      - name: Test bridge
        run: cd bridge && npx vitest run --passWithNoTests
